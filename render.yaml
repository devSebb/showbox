services:
  - type: web
    name: showbox
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: showbox-db
          property: connectionString
      - key: ADMIN_INITIAL_PASSWORD
        sync: false   # Set manually on first deploy, then remove after admin is created

databases:
  - name: showbox-db
    databaseName: showbox
    plan: starter
